<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    color: #eaeaea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  h1 { margin: 0 0 8px; font-weight: 600; letter-spacing: 1px; }
  .info { margin-bottom: 12px; font-size: 14px; opacity: 0.8; }
  canvas {
    background: #0f0f1e;
    border: 2px solid #4ecdc4;
    border-radius: 6px;
    box-shadow: 0 0 20px rgba(78, 205, 196, 0.25);
  }
  .scoreboard {
    display: flex;
    gap: 24px;
    margin-bottom: 12px;
    font-size: 18px;
  }
  .scoreboard span b { color: #4ecdc4; }
  .overlay {
    position: absolute;
    pointer-events: none;
    color: #ff6b6b;
    font-size: 28px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; }
  button {
    margin-top: 14px;
    padding: 8px 18px;
    background: #4ecdc4;
    color: #0f0f1e;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #6ed8d0; }
</style>
</head>
<body>
  <h1>SNAKE</h1>
  <div class="info">Arrow keys or WASD to move &middot; P to pause</div>
  <div class="scoreboard">
    <span>Score: <b id="score">0</b></span>
    <span>Best: <b id="best">0</b></span>
  </div>
  <canvas id="board" width="400" height="400"></canvas>
  <div class="overlay" id="overlay">GAME OVER</div>
  <button id="restart">New Game</button>

<script>
(function () {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const restartBtn = document.getElementById('restart');

  const CELL = 20;
  const COLS = canvas.width / CELL;
  const ROWS = canvas.height / CELL;
  const TICK_MS = 110;

  let snake, dir, nextDir, food, score, best, alive, paused, timer;

  best = parseInt(localStorage.getItem('snake_best') || '0', 10);
  bestEl.textContent = best;

  function reset() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    score = 0;
    alive = true;
    paused = false;
    placeFood();
    scoreEl.textContent = score;
    overlay.classList.remove('show');
    clearInterval(timer);
    timer = setInterval(tick, TICK_MS);
    draw();
  }

  function placeFood() {
    while (true) {
      const f = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) {
        food = f;
        return;
      }
    }
  }

  function tick() {
    if (!alive || paused) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 1;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snake_best', String(best));
      }
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.fillStyle = '#0f0f1e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ff6b6b';
    ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);

    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#4ecdc4' : '#3aa89f';
      ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
    });
  }

  function gameOver() {
    alive = false;
    clearInterval(timer);
    overlay.classList.add('show');
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') trySetDir(0, -1);
    else if (k === 'arrowdown' || k === 's') trySetDir(0, 1);
    else if (k === 'arrowleft' || k === 'a') trySetDir(-1, 0);
    else if (k === 'arrowright' || k === 'd') trySetDir(1, 0);
    else if (k === 'p') paused = !paused;
  });

  function trySetDir(x, y) {
    if (dir.x + x === 0 && dir.y + y === 0) return;
    nextDir = { x, y };
  }

  restartBtn.addEventListener('click', reset);

  reset();
})();
</script>
</body>
</html>
